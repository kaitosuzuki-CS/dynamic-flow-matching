seed: 42
batch_size: 128
total_timesteps: 2000000
warmup_steps: 1000
micro_steps: 3
update_freq: 2
capacity: 1000000
checkpoint_dir: "checkpoints/dynamic_flow_matching"
checkpoint_freq: 100000
gamma: 0.99
alpha: 0.2
tau: 0.999
optimizer:
  actor_lr: 1e-3
  critic_lr: 1e-3
  alpha_lr: 1e-4
  actor_betas: [0.9, 0.999]
  critic_betas: [0.9, 0.999]
  alpha_betas: [0.5, 0.999]
scheduler:
  actor_warmup_steps: 50000
  critic_warmup_steps: 50000
  alpha_warmup_steps: 50000
env:
  baseline_path: "data/dopri5_trajectories.pt"
  obs_shape: [1, 32, 32]
  action_shape: [1]
  lambda_penalty: 50
  max_mse: 0.1
  batch_size: 32
