actor:
  t_emb_dim: 128
  hidden_dim: 512
  encoder:
    latent_dim: 32
    num_layers: 4
    hidden_dim: 128
    output_dim: 50

critic:
  t_emb_dim: 128
  hidden_dim: 512
  encoder:
    latent_dim: 32
    num_layers: 4
    hidden_dim: 128
    output_dim: 50

flow_model:
  ckpt_path: "checkpoints/flow_matching/best_model.pt"
  t_emb_dim: 128
  im_shape: [1, 32, 32]
  encoder:
    in_channels: [32, 64, 128]
    out_channels: [64, 128, 256]
    kernel_size: [3, 3, 3]
    stride: [1, 1, 1]
    padding: [1, 1, 1]
    num_groups: 32
    num_layers: 1
    num_heads: 4
    downsample: [true, true, true]
  bottleneck:
    in_channels: [256, 256]
    out_channels: [256, 128]
    kernel_size: [3, 3]
    stride: [1, 1]
    padding: [1, 1]
    num_groups: 32
    num_layers: 1
    num_heads: 4
  decoder:
    in_channels: [256, 128, 64]
    out_channels: [64, 32, 16]
    kernel_size: [3, 3, 3]
    stride: [1, 1, 1]
    padding: [1, 1, 1]
    num_groups: 32
    num_layers: 1
    num_heads: 4
    upsample: [true, true, true]
